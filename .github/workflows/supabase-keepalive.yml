name: Supabase keepalive

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install asyncpg
        run: python -m pip install asyncpg==0.30.0

      - name: Write keepalive ping
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/keep_supabase_awake.py
